<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Upload Studio</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: white;
        margin: 0;
    }

    header {
        background: #202020;
        padding: 15px;
        font-size: 20px;
        font-weight: bold;
    }

    .container {
        max-width: 800px;
        margin: 20px auto;
        padding: 20px;
        background: #181818;
        border-radius: 10px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
        background: #303030;
        color: white;
    }

    input[type="file"] {
        background: none;
    }

    button {
        background: red;
        border: none;
        padding: 12px;
        width: 100%;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #cc0000;
    }

    .preview {
        margin-top: 20px;
    }

    video {
        width: 100%;
        border-radius: 10px;
    }

    img {
        width: 200px;
        margin-top: 10px;
        border-radius: 5px;
    }

    .meta {
        margin-top: 10px;
    }
</style>
</head>

<body>

<header>🎬 My YouTube Upload Studio</header>

<div class="container">

    <h2>Upload Video</h2>

    <label>Video File</label>
    <input type="file" id="videoInput" accept="video/*">

    <label>Thumbnail</label>
    <input type="file" id="thumbInput" accept="image/*">

    <label>Title</label>
    <input type="text" id="title" placeholder="Enter video title">

    <label>Description</label>
    <textarea id="description" rows="4" placeholder="Enter description"></textarea>

    <button onclick="uploadVideo()">Upload</button>

    <div class="preview" id="previewSection" style="display:none;">
        <h3>Preview</h3>
        <video id="videoPreview" controls></video>
        <img id="thumbPreview">
        <div class="meta">
            <h4 id="previewTitle"></h4>
            <p id="previewDesc"></p>
        </div>
    </div>

</div>

<script>
function uploadVideo() {
    const videoFile = document.getElementById('videoInput').files[0];
    const thumbFile = document.getElementById('thumbInput').files[0];
    const title = document.getElementById('title').value;
    const desc = document.getElementById('description').value;

    if (!videoFile) {
        alert("Please select a video file!");
        return;
    }

    // Video preview
    const videoURL = URL.createObjectURL(videoFile);
    document.getElementById('videoPreview').src = videoURL;

    // Thumbnail preview
    if (thumbFile) {
        const thumbURL = URL.createObjectURL(thumbFile);
        document.getElementById('thumbPreview').src = thumbURL;
    }

    // Metadata
    document.getElementById('previewTitle').innerText = title;
    document.getElementById('previewDesc').innerText = desc;

    document.getElementById('previewSection').style.display = "block";

    alert("Upload simulated! (No real server connected)");
}
</script>

</body>
</html>
